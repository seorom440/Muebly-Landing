<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Muebly – AI Interior Design App | Redesign Any Room Instantly</title>
    <meta name="description" content="Muebly is an AI interior design app that lets you redesign, repaint and virtually stage any room in seconds. Upload a photo, choose a style, and shop the look. Free to start." />
    <meta name="keywords" content="AI interior design, AI room design, virtual staging, interior design app, room redesign AI, AI furniture placement, home design app" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://muebly.app/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://muebly.app/" />
    <meta property="og:title" content="Muebly – AI Interior Design App | Redesign Any Room Instantly" />
    <meta property="og:description" content="Upload a photo of your room and redesign it with AI in seconds. Choose from modern, minimalist, loft and more styles. Shop the furniture directly from the app." />
    <meta property="og:image" content="https://muebly.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Muebly" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@mueblyapp" />
    <meta name="twitter:title" content="Muebly – AI Interior Design App" />
    <meta name="twitter:description" content="Redesign any room instantly with AI. Upload a photo, pick a style, shop the furniture. Free to start." />
    <meta name="twitter:image" content="https://muebly.app/og-image.jpg" />

    <!-- App / Mobile -->
    <meta name="theme-color" content="#00C27A" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Muebly",
      "description": "Muebly is an AI-powered interior design app that lets users redesign, repaint and virtually stage any room in seconds. Upload a photo, choose a design style, and shop recommended furniture directly from the app.",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "iOS, Android, Web",
      "url": "https://muebly.app",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD",
          "description": "30 credits, AI design generations, 1K exports, AI chat guidance"
        },
        {
          "@type": "Offer",
          "name": "Weekly",
          "price": "6.99",
          "priceCurrency": "USD",
          "description": "300 credits, 2K exports, private mode, watermark-free"
        },
        {
          "@type": "Offer",
          "name": "Monthly",
          "price": "24.99",
          "priceCurrency": "USD",
          "description": "1500 credits, 4K exports, commercial usage license, API access"
        }
      ],
      "screenshot": "https://muebly.app/og-image.jpg",
      "featureList": [
        "AI room redesign from a photo",
        "Virtual furniture staging",
        "Multiple interior design styles (Modern, Minimalist, Loft, Organic)",
        "AI-powered product recommendations",
        "Shop furniture from Amazon, IKEA, JYSK, Ashley",
        "Commercial real estate staging",
        "E-commerce product visualization"
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1200"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Muebly",
      "url": "https://muebly.app",
      "logo": "https://muebly.app/logo.svg",
      "description": "AI Interior Design Platform",
      "sameAs": [
        "https://twitter.com/mueblyapp",
        "https://instagram.com/mueblyapp",
        "https://linkedin.com/company/muebly"
      ]
    }
    </script>

    <!-- JSON-LD: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Muebly?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Muebly is an AI interior design app that lets you redesign any room instantly. You upload a photo of your space, choose a style (Modern, Minimalist, Loft, Organic, and more), and the AI generates a redesigned version in seconds. You can also shop the exact furniture pieces recommended for your new design."
          }
        },
        {
          "@type": "Question",
          "name": "How does Muebly's AI room redesign work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Muebly uses generative AI to analyze your room photo and apply a chosen design style. You upload an image, select a style or describe what you want, and the AI instantly generates a photorealistic redesign. You can then export the image, download it, or shop the recommended furniture directly from the app."
          }
        },
        {
          "@type": "Question",
          "name": "Is Muebly free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Muebly has a free plan that includes 30 credits, AI design generations, and 1K image exports. Paid plans start at $6.99/week and include more credits, 2K-4K exports, private mode, and commercial usage licenses."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Muebly for real estate virtual staging?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Muebly is widely used by real estate agents and property managers to virtually stage empty rooms for listings. Upload a photo of an empty room and get a fully furnished, professionally staged version in seconds — without hiring a staging company."
          }
        },
        {
          "@type": "Question",
          "name": "Can I shop the furniture shown in my AI-generated design?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Muebly's Shop Your Design feature identifies the furniture and decor in your AI-generated room and shows you where to buy them. Products are sourced from Amazon, IKEA, JYSK, Ashley, and other major retailers."
          }
        },
        {
          "@type": "Question",
          "name": "What interior design styles does Muebly support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Muebly supports a wide range of interior design styles including Modern, Minimalist, Loft, Organic, Scandinavian, Industrial, Bohemian, and more. New styles are added regularly based on trends."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
